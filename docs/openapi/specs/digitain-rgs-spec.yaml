openapi: 3.0.0
info:
  title: Digitain RGS Provider API
  version: 1.0.0
  description: |
    Gaming provider webhooks for Digitain RGS integration.
    All requests include HMAC-SHA256 signature authentication.
    Supports batch processing of multiple items per request.
  contact:
    name: Casino Proxy Team

servers:
  - url: /v1/webhooks

paths:
  /digitain-rgs/authenticate:
    post:
      operationId: digitainAuthenticate
      tags:
        - Digitain RGS
      summary: Authenticate player
      description: Authenticate player session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainAuthenticateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainAuthenticateResponse'

  /digitain-rgs/getbalance:
    post:
      operationId: digitainGetBalance
      tags:
        - Digitain RGS
      summary: Get player balance
      description: Retrieve current player balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainGetBalanceRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainGetBalanceResponse'

  /digitain-rgs/bet:
    post:
      operationId: digitainBet
      tags:
        - Digitain RGS
      summary: Place bet
      description: Place bet and debit player account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainBetRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainBetResponse'

  /digitain-rgs/win:
    post:
      operationId: digitainWin
      tags:
        - Digitain RGS
      summary: Record win
      description: Record player win and credit account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainWinRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainWinResponse'

  /digitain-rgs/betwin:
    post:
      operationId: digitainBetWin
      tags:
        - Digitain RGS
      summary: Combined bet and win
      description: Combined bet placement and win in single transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainBetWinRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainBetWinResponse'

  /digitain-rgs/refund:
    post:
      operationId: digitainRefund
      tags:
        - Digitain RGS
      summary: Refund transaction
      description: Refund or cancel existing transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainRefundRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainRefundResponse'

  /digitain-rgs/amend:
    post:
      operationId: digitainAmend
      tags:
        - Digitain RGS
      summary: Amend transaction
      description: Modify existing transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainAmendRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainAmendResponse'

  /digitain-rgs/checktxstatus:
    post:
      operationId: digitainCheckTxStatus
      tags:
        - Digitain RGS
      summary: Check transaction status
      description: Verify status of existing transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainCheckTxStatusRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainCheckTxStatusResponse'

  /digitain-rgs/charge:
    post:
      operationId: digitainCharge
      tags:
        - Digitain RGS
      summary: Charge player
      description: Charge player account (debit for multiple items)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainChargeRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainChargeResponse'

  /digitain-rgs/promowin:
    post:
      operationId: digitainPromoWin
      tags:
        - Digitain RGS
      summary: Promotional win
      description: Record promotional win notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainPromoWinRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainPromoWinResponse'

  /digitain-rgs/refreshtoken:
    post:
      operationId: digitainRefreshToken
      tags:
        - Digitain RGS
      summary: Refresh player token
      description: Refresh or renew player session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitainRefreshTokenRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitainRefreshTokenResponse'

components:
  schemas:
    DigitainBaseRequest:
      type: object
      required:
        - operatorId
        - timestamp
        - signature
      properties:
        token:
          type: string
          description: Player session token (optional alternative to playerId)
          example: operator_slug_token123
        playerId:
          type: string
          description: Player ID (optional alternative to token)
          example: operator_slug_player456
        operatorId:
          type: string
          example: op_123
        timestamp:
          type: string
          description: Timestamp in format YYYYMMDDHHmmss
          example: '20260511143022'
        signature:
          type: string
          description: HMAC-SHA256 signature
          example: hmac_sha256_value

    DigitainAuthenticateRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'

    DigitainAuthenticateResponse:
      type: object
      properties:
        errorCode:
          type: integer
          description: 1 = success
          example: 1
        playerId:
          type: string
          example: operator_slug_player456
        balance:
          type: number
          format: double
          example: 1000.00
        currency:
          type: string
          example: BRL

    DigitainGetBalanceRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'

    DigitainGetBalanceResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        playerId:
          type: string
          example: operator_slug_player456
        balance:
          type: number
          format: double
          example: 1000.00
        currency:
          type: string
          example: BRL

    DigitainBetRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              minItems: 1
              items:
                type: object
                required:
                  - info
                  - amount
                properties:
                  info:
                    type: string
                    example: bet_info
                  amount:
                    type: number
                    format: double
                    example: 50.00

    DigitainBetResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            properties:
              info:
                type: string
              balance:
                type: number
                format: double
              transactionId:
                type: string

    DigitainWinRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              minItems: 1
              items:
                type: object
                required:
                  - info
                  - amount
                properties:
                  info:
                    type: string
                  amount:
                    type: number
                    format: double

    DigitainWinResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            properties:
              info:
                type: string
              balance:
                type: number
                format: double
              transactionId:
                type: string

    DigitainBetWinRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              minItems: 1
              items:
                type: object
                required:
                  - info
                  - betAmount
                  - winAmount
                properties:
                  info:
                    type: string
                  betAmount:
                    type: number
                    format: double
                  winAmount:
                    type: number
                    format: double

    DigitainBetWinResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            properties:
              info:
                type: string
              balance:
                type: number
                format: double
              transactionId:
                type: string

    DigitainRefundRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              minItems: 1
              items:
                type: object
                required:
                  - info
                  - transactionId
                  - amount
                properties:
                  info:
                    type: string
                  transactionId:
                    type: string
                  amount:
                    type: number
                    format: double

    DigitainRefundResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            properties:
              info:
                type: string
              balance:
                type: number
                format: double
              transactionId:
                type: string

    DigitainAmendRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              minItems: 1
              items:
                type: object
                required:
                  - info
                  - transactionId
                  - amount
                properties:
                  info:
                    type: string
                  transactionId:
                    type: string
                  amount:
                    type: number
                    format: double

    DigitainAmendResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            properties:
              info:
                type: string
              balance:
                type: number
                format: double
              transactionId:
                type: string

    DigitainCheckTxStatusRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'
        - type: object
          required:
            - providerTxId
          properties:
            providerTxId:
              type: string
              example: provider_tx_id

    DigitainCheckTxStatusResponse:
      type: object
      properties:
        timestamp:
          type: string
          example: '20260511143022'
        signature:
          type: string
        txStatus:
          type: boolean
          example: true
        txCreationDate:
          type: string
          format: date-time
        externalTxId:
          type: string
        currencyId:
          type: string
          example: USD
        errorCode:
          type: integer
          example: 1

    DigitainChargeRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              minItems: 1
              items:
                type: object
                required:
                  - info
                  - amount
                properties:
                  info:
                    type: string
                  amount:
                    type: number
                    format: double

    DigitainChargeResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            properties:
              info:
                type: string
              balance:
                type: number
                format: double
              transactionId:
                type: string

    DigitainPromoWinRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'
        - type: object
          required:
            - items
          properties:
            items:
              type: array
              minItems: 1
              items:
                type: object
                required:
                  - info
                  - amount
                properties:
                  info:
                    type: string
                  amount:
                    type: number
                    format: double
                  campaignId:
                    type: string

    DigitainPromoWinResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            properties:
              info:
                type: string
              balance:
                type: number
                format: double
              transactionId:
                type: string

    DigitainRefreshTokenRequest:
      allOf:
        - $ref: '#/components/schemas/DigitainBaseRequest'

    DigitainRefreshTokenResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 1
        token:
          type: string
          example: operator_slug_new_token456
        timestamp:
          type: string
          example: '20260511143022'
        signature:
          type: string

  securitySchemes:
    hmacSha256:
      type: apiKey
      in: query
      name: signature
      description: HMAC-SHA256 signature for request authentication
