openapi: 3.0.0
info:
  title: Evoplay Provider API
  version: 1.0.0
  description: |
    Gaming provider webhooks for Evoplay integration.
    Single endpoint with dynamic method dispatch via request body.
  contact:
    name: Casino Proxy Team

servers:
  - url: /v1/webhooks

paths:
  /evoplay:
    post:
      operationId: evoplayWebhook
      tags:
        - Evoplay
      summary: Evoplay webhook gateway
      description: |
        Universal webhook endpoint for all Evoplay operations.
        Method specified in request body (name field).

        Allowed methods: init, bet, win, refund, BalanceIncrease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvoplayRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvoplayResponse'
        '400':
          description: Invalid method or request
        '500':
          description: Server error

components:
  schemas:
    EvoplayRequest:
      type: object
      required:
        - name
        - token
        - data
        - signature
      properties:
        name:
          type: string
          description: Operation method name
          enum:
            - init
            - bet
            - win
            - refund
            - BalanceIncrease
          example: bet
        token:
          type: string
          description: Player session token (sanitized)
          example: token123
        data:
          type: object
          description: Operation-specific data
          properties:
            user_id:
              type: string
              example: user_456
            game_id:
              type: string
              example: game_789
            amount:
              type: number
              format: double
              example: 100.50
            transaction_id:
              type: string
              example: txn_128
            round_id:
              type: string
              description: Optional round identifier
              example: round_456
            extra_data:
              type: object
              description: Optional extra operation data
        signature:
          type: string
          description: Operation signature
          example: signature_value

    EvoplayResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - success
            - error
          example: success
        data:
          type: object
          description: Response data
          properties:
            user_id:
              type: string
            balance:
              type: number
              format: double
            transaction_id:
              type: string
            message:
              type: string
        error:
          type: string
          description: Error message if applicable

  securitySchemes:
    signature:
      type: apiKey
      in: query
      name: signature
      description: Evoplay operation signature
