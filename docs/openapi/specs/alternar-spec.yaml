openapi: 3.0.0
info:
  title: Alternar Provider API
  version: 1.0.0
  description: |
    Gaming provider webhooks for Alternar integration.
    Generic action handler with dynamic action dispatch.
  contact:
    name: Casino Proxy Team

servers:
  - url: /v1/webhooks

paths:
  /alternar/:
    post:
      operationId: alternarRedirect
      tags:
        - Alternar
      summary: Alternar redirect handler
      description: |
        Universal redirect handler for Alternar operations.
        Supports: launch, logout actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlternarRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlternarResponse'
        '400':
          description: Invalid request
        '500':
          description: Server error

components:
  schemas:
    AlternarRequest:
      type: object
      required:
        - playerId
        - token
        - action
        - signature
      properties:
        playerId:
          type: string
          description: Player ID
          example: player_456
        token:
          type: string
          description: Player session token (sanitized)
          example: token123
        action:
          type: string
          description: Action to perform
          enum:
            - launch
            - logout
          example: launch
        gameId:
          type: string
          description: Optional game ID
          example: game_789
        signature:
          type: string
          description: Request signature
          example: hash_value

    AlternarResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Action completed successfully
        data:
          type: object
          description: Optional response data
          properties:
            action:
              type: string
            playerId:
              type: string
            redirectUrl:
              type: string
              description: Optional redirect URL for launch action

  securitySchemes:
    signature:
      type: apiKey
      in: query
      name: signature
      description: Request signature for authentication
