version: '3.8'

# Casino Proxy OpenAPI Documentation Viewer
# Start with: docker-compose -f application/docs/openapi-viewers/docker-compose.yml up -d
#
# Single Swagger UI container for API testing
#
# Access locally:
# - Swagger UI (testing & documentation): http://localhost:8081

services:
  swagger-ui-main:
    image: swaggerapi/swagger-ui:latest
    container_name: casino-proxy-swagger-ui-main
    ports:
      - "8081:8080"
    volumes:
      - ../openapi:/usr/share/nginx/html/specs:ro
      - ./docker/swagger-initializer-main.js:/usr/share/nginx/html/swagger-initializer.js:ro
    environment:
      - BASE_URL=/
    networks:
      - casino-docs
    labels:
      - "com.casino-proxy.project=Casino Proxy API Platform"
      - "com.casino-proxy.service=swagger-ui-main"
      - "com.casino-proxy.description=Casino Proxy API - Interactive API documentation with Try It Out"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  casino-docs:
    driver: bridge
    name: casino-docs-network
