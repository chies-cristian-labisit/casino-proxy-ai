openapi: 3.0.0
info:
  title: Mancala Provider API
  version: 1.0.0
  description: |
    Gaming provider webhooks for Mancala integration.
    All requests include MD5 hash authentication.
  contact:
    name: Casino Proxy Team

servers:
  - url: /v1/webhooks

paths:
  /mancala/Balance:
    post:
      operationId: mancalaBalance
      tags:
        - Mancala
      summary: Get player balance
      description: Retrieve current player balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MancalaBalanceRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MancalaBalanceResponse'

  /mancala/Credit:
    post:
      operationId: mancalaCredit
      tags:
        - Mancala
      summary: Credit player account
      description: Credit player account (win/payout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManacalaCreditRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManacalaCreditResponse'

  /mancala/Debit:
    post:
      operationId: mancalaDebit
      tags:
        - Mancala
      summary: Debit player account
      description: Debit player account (bet placement)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MancalaDebitRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MancalaDebitResponse'

  /mancala/Refund:
    post:
      operationId: mancalaRefund
      tags:
        - Mancala
      summary: Refund transaction
      description: Refund or cancel a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MancalaRefundRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MancalaRefundResponse'

components:
  schemas:
    MancalaBalanceRequest:
      type: object
      required:
        - SessionId
        - Hash
      properties:
        SessionId:
          type: string
          description: Player session ID (sanitized, without operator prefix)
          example: session123
        ExtraData:
          type: string
          description: Optional JSON extra data
          example: '{"operator_slug": "my_operator"}'
        Hash:
          type: string
          description: MD5 hash of request
          example: md5_hash_value

    MancalaBalanceResponse:
      type: object
      properties:
        balance:
          type: number
          format: double
          example: 1500.50
        currency:
          type: string
          example: BRL

    ManacalaCreditRequest:
      type: object
      required:
        - SessionId
        - TransactionGuid
        - Amount
        - RoundGuid
        - Hash
      properties:
        SessionId:
          type: string
          example: session123
        TransactionGuid:
          type: string
          example: guid_value
        Amount:
          type: number
          format: double
          example: 100.50
        RoundGuid:
          type: string
          example: round_guid
        ExtraData:
          type: string
          description: Optional JSON extra data
          example: '{"operator_slug": "my_operator"}'
        Hash:
          type: string
          example: md5_hash_value

    ManacalaCreditResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        balance:
          type: number
          format: double
          example: 1600.00
        transactionId:
          type: string
          example: txn_123

    MancalaDebitRequest:
      type: object
      required:
        - SessionId
        - TransactionGuid
        - Amount
        - RoundGuid
        - Hash
      properties:
        SessionId:
          type: string
          example: session123
        TransactionGuid:
          type: string
          example: txn_guid
        Amount:
          type: number
          format: double
          example: 50.00
        RoundGuid:
          type: string
          example: round_guid
        ExtraData:
          type: string
          description: Optional JSON extra data
          example: '{"operator_slug": "my_operator"}'
        Hash:
          type: string
          example: md5_hash_value

    MancalaDebitResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        balance:
          type: number
          format: double
          example: 1450.00
        transactionId:
          type: string
          example: txn_124

    MancalaRefundRequest:
      type: object
      required:
        - SessionId
        - RefundTransactionGuid
        - Amount
        - Hash
      properties:
        SessionId:
          type: string
          example: session123
        RefundTransactionGuid:
          type: string
          example: txn_guid
        Amount:
          type: number
          format: double
          example: 50.00
        ExtraData:
          type: string
          description: Optional JSON extra data
          example: '{"operator_slug": "my_operator"}'
        Hash:
          type: string
          example: md5_hash_value

    MancalaRefundResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        balance:
          type: number
          format: double
          example: 1500.00
        transactionId:
          type: string
          example: txn_125

  securitySchemes:
    md5Hash:
      type: apiKey
      in: query
      name: Hash
      description: MD5 hash for request authentication
