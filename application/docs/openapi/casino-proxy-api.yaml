openapi: 3.0.0
info:
  title: Casino Proxy Gateway API - Complete
  version: 2.0.0
  description: |
    Complete OpenAPI 3.0 specification for Casino Proxy webhook gateway.

    **All 50 Endpoints Documented:**
    - 8 Gaming Providers: 41 webhook endpoints
    - Admin Management: 4 endpoints
    - System Endpoints: 3 endpoints
    - Health & utility: 2 endpoints

    **Providers:** Pragmatic Play (9), Mancala (4), Digitain RGS (11), PG Soft (4),
    Evoplay (5), Evolution Gaming (5), OpenBox (4), Alternar (1)

servers:
  - url: /v1
    description: API base path

paths:
  # ========================================
  # SYSTEM ENDPOINTS
  # ========================================

  /status:
    get:
      summary: Health check
      tags: [System]
      operationId: healthCheck
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OK"

  /entry:
    post:
      summary: Player session entry
      tags: [System]
      operationId: playerEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Session initialized

  /image:
    post:
      summary: Image upload
      tags: [System]
      operationId: uploadImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
      responses:
        '200':
          description: Image uploaded

  # ========================================
  # PRAGMATIC PLAY (9 endpoints)
  # ========================================

  /webhooks/pragmatic-play/authenticate:
    post:
      summary: Pragmatic Play - Authenticate
      tags: [Pragmatic Play]
      operationId: ppAuthenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  /webhooks/pragmatic-play/balance:
    post:
      summary: Pragmatic Play - Get balance
      tags: [Pragmatic Play]
      operationId: ppBalance
      requestBody:
