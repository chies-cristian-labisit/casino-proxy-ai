      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  # ========================================
  # OPENBOX (4 endpoints - uses PUT)
  # ========================================

  /webhooks/openbox/seamless/balance:
    put:
      summary: OpenBox - Get balance
      tags: [OpenBox]
      operationId: obxBalance
      requestBody:
        required: true
