          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  /webhooks/openbox/seamless/win:
    put:
      summary: OpenBox - Record win
      tags: [OpenBox]
      operationId: obxWin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  /webhooks/openbox/seamless/refund:
    put:
      summary: OpenBox - Refund transaction
      tags: [OpenBox]
      operationId: obxRefund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  # ========================================
  # ALTERNAR (1 endpoint)
  # ========================================

  /webhooks/alternar/:
    post:
      summary: Alternar - Redirect handler
      tags: [Alternar]
      operationId: alternarRedirect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  # ========================================
  # ADMIN/INTERNAL ENDPOINTS (4 endpoints)
  # ========================================

  /internal/operator/:
    get:
      summary: List all operators
      tags: [Admin - Operators]
      operationId: listOperators
      responses:
        '200':
          description: Success

  /internal/operator/store:
    post:
      summary: Create new operator
      tags: [Admin - Operators]
      operationId: storeOperator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created

  /internal/operator/delete/{slug}:
    delete:
      summary: Delete operator
      tags: [Admin - Operators]
      operationId: deleteOperator
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /internal/credentials/:
    get:
      summary: List provider credentials
      tags: [Admin - Credentials]
      operationId: listCredentials
      responses:
        '200':
          description: Success

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
