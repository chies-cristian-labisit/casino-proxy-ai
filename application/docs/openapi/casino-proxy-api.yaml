  # ========================================
  # EVOPLAY (5 endpoints via single gateway)
  # ========================================

  /webhooks/evoplay:
    post:
      summary: Evoplay - Gateway (init|bet|win|refund|BalanceIncrease)
      description: Single endpoint with method in request body (name field)
      tags: [Evoplay]
      operationId: evoplayGateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  enum: [init, bet, win, refund, BalanceIncrease]
      responses:
        '200':
          description: Success

  # ========================================
  # EVOLUTION GAMING (5 endpoints)
  # ========================================

  /webhooks/evolution/authentication:
    post:
      summary: Evolution - Authenticate
      tags: [Evolution Gaming]
      operationId: evoAuthenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
