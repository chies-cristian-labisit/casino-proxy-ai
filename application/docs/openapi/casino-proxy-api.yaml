  # ========================================
  # PG SOFT (4 endpoints)
  # ========================================

  /webhooks/pgsoft/VerifySession:
    post:
      summary: PG Soft - Verify session
      tags: [PG Soft]
      operationId: pgsVerifySession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
