    post:
      summary: Pragmatic Play - Bonus win
      tags: [Pragmatic Play]
      operationId: ppBonusWin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  /webhooks/pragmatic-play/jackpotWin:
    post:
      summary: Pragmatic Play - Jackpot win
      tags: [Pragmatic Play]
      operationId: ppJackpotWin
      requestBody:
        required: true
