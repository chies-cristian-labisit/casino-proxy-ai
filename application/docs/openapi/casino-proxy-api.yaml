      responses:
        '200':
          description: Success

  /webhooks/pragmatic-play/promoWin:
    post:
      summary: Pragmatic Play - Promo win
      tags: [Pragmatic Play]
      operationId: ppPromoWin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  /webhooks/pragmatic-play/adjustment:
    post:
      summary: Pragmatic Play - Account adjustment
      tags: [Pragmatic Play]
      operationId: ppAdjustment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  # ========================================
  # MANCALA (4 endpoints)
  # ========================================

  /webhooks/mancala/Balance:
    post:
      summary: Mancala - Get balance
      tags: [Mancala]
      operationId: mncBalance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success

  /webhooks/mancala/Credit:
    post:
      summary: Mancala - Credit account
      tags: [Mancala]
