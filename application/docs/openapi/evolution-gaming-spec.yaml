openapi: 3.0.3
info:
  title: Evolution Gaming Provider API
  description: |
    Complete OpenAPI 3.0 specification for Evolution Gaming webhook integration.
    Covers 5 endpoints handling authentication, financial transactions (debit/credit), rollback, and token refresh.
  version: 1.0.0
  contact:
    name: Casino Proxy Migration
    url: https://github.com/casino-proxy/docs

servers:
  - url: https://casino-proxy.example.com/v1/webhooks/evolution
    description: Casino Proxy Gateway (Evolution Gaming endpoint)
  - url: http://localhost:3000/v1/webhooks/evolution
    description: Local Development

paths:
  /authentication:
    post:
      summary: Authenticate player session
      description: |
        Authenticate a player and retrieve initial session information including balance and player details.
        Called when player launches an Evolution game.
      operationId: authentication
      tags:
        - Session Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticationRequest'
            example:
              operatorId: 1
              token: "my-operator_abc123xyz"
              platformId: 0
              timestamp: 1715177400123
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
              example:
                operatorId: 1
                uid: 12345
                nickName: "John Player"
                token: "my-operator_new-token-xyz"
                balance: 1000.50
                currency: "BRL"
                errorCode: 0
                errorDescription: "ok"
                timestamp: 1715177400123
        '401':
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: 1
                errorDescription: "Invalid signature"
        '404':
          description: Operator or player not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: 4
                errorDescription: "Player not found"
      security:
        - HmacSHA256: []

  /debit:
    post:
      summary: Debit player account (bet placement)
      description: |
        Place a bet by debiting from player's balance.
        Transaction state: PENDING → COMPLETED/FAILED
      operationId: debit
      tags:
        - Financial Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebitRequest'
            example:
              serverId: 1
              operatorId: 1
              token: "my-operator_abc123xyz"
              uid: 12345
              transactionId: "txn_001_bet"
              roundId: "round_001"
              gameId: "game_001"
              tableId: "table_001"
              currency: "BRL"
              debitAmount: 50.00
              isEndRound: false
              platformId: 0
              timestamp: 1715177400123
      responses:
        '200':
          description: Bet placed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebitResponse'
              example:
                operatorId: 1
                uid: 12345
                token: "my-operator_abc123xyz"
                balance: 950.50
                transactionId: "txn_001_bet"
                currency: "BRL"
                errorCode: 0
                errorDescription: "Completed successfully"
                timestamp: 1715177400124
        '409':
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: 3
                errorDescription: "Insufficient balance"
      security:
        - HmacSHA256: []

  /credit:
    post:
      summary: Credit player account (win payout)
      description: |
        Award winnings to player's account.
        Transaction state: PENDING → COMPLETED/FAILED
      operationId: credit
      tags:
        - Financial Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditRequest'
            example:
              serverId: 1
              operatorId: 1
              token: "my-operator_abc123xyz"
              uid: 12345
              transactionId: "txn_001_win"
              debitTransactionId: "txn_001_bet"
              roundId: "round_001"
              gameId: "game_001"
              tableId: "table_001"
              currency: "BRL"
              creditAmount: 100.00
              isEndRound: true
              platformId: 0
              timestamp: 1715177400500
      responses:
        '200':
          description: Winnings credited successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditResponse'
              example:
                operatorId: 1
                uid: 12345
                token: "my-operator_abc123xyz"
                balance: 1050.50
                transactionId: "txn_001_win"
                currency: "BRL"
                errorCode: 0
                errorDescription: "Completed successfully"
                timestamp: 1715177400501
      security:
        - HmacSHA256: []

  /rollback:
    post:
      summary: Rollback (refund) a previous debit transaction
      description: |
        Reverse a previous bet/debit transaction.
        State: ROLLED_BACK
      operationId: rollback
      tags:
        - Financial Transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackRequest'
            example:
              serverId: 1
              operatorId: 1
              token: "my-operator_abc123xyz"
              uid: 12345
              transactionId: "txn_001_rollback"
              roundId: "round_001"
              gameId: "game_001"
              tableId: "table_001"
              currency: "BRL"
              rollbackAmount: 50.00
              platformId: 0
              timestamp: 1715177400600
      responses:
        '200':
          description: Rollback completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackResponse'
              example:
                operatorId: 1
                uid: 12345
                token: "my-operator_abc123xyz"
                balance: 1000.50
                transactionId: "txn_001_rollback"
                currency: "BRL"
                errorCode: 0
                errorDescription: "Completed successfully"
                timestamp: 1715177400601
      security:
        - HmacSHA256: []

  /getNewToken:
    post:
      summary: Get new session token (token refresh)
      description: |
        Refresh player's session token.
        Allows extending session without re-authentication.
      operationId: getNewToken
      tags:
        - Session Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetNewTokenRequest'
            example:
              operatorId: 1
              currentToken: "my-operator_abc123xyz"
              gameId: "game_001"
              tableId: "table_001"
              uid: 12345
              timestamp: 1715177400700
      responses:
        '200':
          description: New token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNewTokenResponse'
              example:
                operatorId: 1
                token: "my-operator_new-token-def456"
                balance: 1000.50
                uid: 12345
                errorCode: 0
                errorDescription: "ok"
                timestamp: 1715177400701
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: 1
                errorDescription: "Invalid token"
      security:
        - HmacSHA256: []

components:
  schemas:
    AuthenticationRequest:
      type: object
      required:
        - operatorId
        - token
        - platformId
        - timestamp
      properties:
        operatorId:
          type: integer
          description: Operator ID
          example: 1
        token:
          type: string
          description: Session token in format {operator_slug}_{token}
          example: "my-operator_abc123xyz"
        platformId:
          type: integer
          description: Platform identifier
          example: 0
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1715177400123

    AuthenticationResponse:
      type: object
      required:
        - operatorId
        - uid
        - token
        - balance
        - currency
        - errorCode
        - errorDescription
      properties:
        operatorId:
          type: integer
          example: 1
        uid:
          type: integer
          description: Player unique ID
          example: 12345
        nickName:
          type: string
          description: Player display name
          example: "John Player"
        token:
          type: string
          description: New session token with operator prefix
          example: "my-operator_new-token-xyz"
        balance:
          type: number
          format: double
          description: Player's cash balance
          minimum: 0
          example: 1000.50
        currency:
          type: string
          description: ISO 4217 currency code
          example: "BRL"
        errorCode:
          type: integer
          description: Error code (0=success, >0=error)
          example: 0
        errorDescription:
          type: string
          description: Human-readable error message
          example: "ok"
        timestamp:
          type: integer
          format: int64
          description: Response timestamp in milliseconds
          example: 1715177400123

    DebitRequest:
      type: object
      required:
        - operatorId
        - token
        - uid
        - transactionId
        - roundId
        - gameId
        - currency
        - debitAmount
        - platformId
        - timestamp
      properties:
        serverId:
          type: integer
          example: 1
        operatorId:
          type: integer
          example: 1
        token:
          type: string
          description: Session token with operator prefix
          example: "my-operator_abc123xyz"
        uid:
          type: integer
          description: Player unique ID
          example: 12345
        transactionId:
          type: string
          description: Unique bet transaction ID
          example: "txn_001_bet"
        roundId:
          type: string
          description: Game round identifier
          example: "round_001"
        gameId:
          type: string
          description: Game identifier
          example: "game_001"
        tableId:
          type: string
          description: Table identifier (for live games)
          example: "table_001"
        betTypeID:
          type: integer
          description: Bet type identifier
          example: 1
        currency:
          type: string
          description: ISO 4217 currency code
          example: "BRL"
        debitAmount:
          type: number
          format: double
          description: Amount to debit (bet amount)
          minimum: 0.01
          example: 50.00
        seatId:
          type: integer
          description: Seat identifier
        isEndRound:
          type: boolean
          description: Whether this is the last bet in the round
          example: false
        platformId:
          type: integer
          example: 0
        timestamp:
          type: integer
          format: int64
          description: Transaction timestamp in milliseconds
          example: 1715177400123

    DebitResponse:
      type: object
      required:
        - operatorId
        - uid
        - token
        - balance
        - transactionId
        - currency
        - errorCode
      properties:
        operatorId:
          type: integer
          example: 1
        uid:
          type: integer
          example: 12345
        token:
          type: string
          description: Session token with operator prefix
          example: "my-operator_abc123xyz"
        balance:
          type: number
          format: double
          description: Updated player balance after debit
          example: 950.50
        transactionId:
          type: string
          description: Transaction ID from request
          example: "txn_001_bet"
        roundId:
          type: string
        currency:
          type: string
          example: "BRL"
        errorCode:
          type: integer
          example: 0
        errorDescription:
          type: string
          example: "Completed successfully"
        timestamp:
          type: integer
          format: int64
          example: 1715177400124

    CreditRequest:
      type: object
      required:
        - operatorId
        - token
        - uid
        - transactionId
        - roundId
        - gameId
        - currency
        - creditAmount
        - platformId
        - timestamp
      properties:
        serverId:
          type: integer
          example: 1
        operatorId:
          type: integer
          example: 1
        token:
          type: string
          description: Session token with operator prefix
          example: "my-operator_abc123xyz"
        uid:
          type: integer
          description: Player unique ID
          example: 12345
        transactionId:
          type: string
          description: Unique win transaction ID
          example: "txn_001_win"
        debitTransactionId:
          type: string
          description: Reference to related bet transaction
          example: "txn_001_bet"
        roundId:
          type: string
          description: Game round identifier
          example: "round_001"
        gameId:
          type: string
          description: Game identifier
          example: "game_001"
        tableId:
          type: string
          description: Table identifier
          example: "table_001"
        betTypeID:
          type: integer
          example: 1
        currency:
          type: string
          example: "BRL"
        creditAmount:
          type: number
          format: double
          description: Amount to credit (payout amount)
          minimum: 0.01
          example: 100.00
        returnReason:
          type: integer
          description: Return reason code
          example: 1
        isEndRound:
          type: boolean
          description: Whether this ends the round
          example: true
        seatId:
          type: integer
        platformId:
          type: integer
          example: 0
        timestamp:
          type: integer
          format: int64
          example: 1715177400500

    CreditResponse:
      type: object
      required:
        - operatorId
        - uid
        - token
        - balance
        - transactionId
        - currency
        - errorCode
      properties:
        operatorId:
          type: integer
          example: 1
        uid:
          type: integer
          example: 12345
        token:
          type: string
          description: Session token with operator prefix
          example: "my-operator_abc123xyz"
        balance:
          type: number
          format: double
          description: Updated player balance after credit
          example: 1050.50
        transactionId:
          type: string
          description: Transaction ID from request
          example: "txn_001_win"
        roundId:
          type: string
        currency:
          type: string
          example: "BRL"
        errorCode:
          type: integer
          example: 0
        errorDescription:
          type: string
          example: "Completed successfully"
        timestamp:
          type: integer
          format: int64
          example: 1715177400501

    RollbackRequest:
      type: object
      required:
        - operatorId
        - token
        - uid
        - transactionId
        - roundId
        - gameId
        - currency
        - rollbackAmount
        - platformId
        - timestamp
      properties:
        serverId:
          type: integer
          example: 1
        operatorId:
          type: integer
          example: 1
        token:
          type: string
          description: Session token with operator prefix
          example: "my-operator_abc123xyz"
        uid:
          type: integer
          example: 12345
        transactionId:
          type: string
          description: Unique rollback transaction ID
          example: "txn_001_rollback"
        roundId:
          type: string
          example: "round_001"
        gameId:
          type: string
          example: "game_001"
        tableId:
          type: string
          example: "table_001"
        currency:
          type: string
          example: "BRL"
        rollbackAmount:
          type: number
          format: double
          description: Amount to rollback (original debit amount)
          example: 50.00
        seatId:
          type: integer
        platformId:
          type: integer
          example: 0
        timestamp:
          type: integer
          format: int64
          example: 1715177400600

    RollbackResponse:
      type: object
      required:
        - operatorId
        - uid
        - token
        - balance
        - transactionId
        - currency
        - errorCode
      properties:
        operatorId:
          type: integer
          example: 1
        uid:
          type: integer
          example: 12345
        token:
          type: string
          description: Session token with operator prefix
          example: "my-operator_abc123xyz"
        balance:
          type: number
          format: double
          description: Updated balance after rollback
          example: 1000.50
        transactionId:
          type: string
          description: Transaction ID from request
          example: "txn_001_rollback"
        roundId:
          type: string
        currency:
          type: string
          example: "BRL"
        errorCode:
          type: integer
          example: 0
        errorDescription:
          type: string
          example: "Completed successfully"
        timestamp:
          type: integer
          format: int64
          example: 1715177400601

    GetNewTokenRequest:
      type: object
      required:
        - operatorId
        - currentToken
        - uid
        - platformId
        - timestamp
      properties:
        operatorId:
          type: integer
          example: 1
        currentToken:
          type: string
          description: Current session token with operator prefix
          example: "my-operator_abc123xyz"
        gameId:
          type: string
          description: Current game ID
          example: "game_001"
        tableId:
          type: string
          description: Current table ID
        uid:
          type: integer
          example: 12345
        platformId:
          type: integer
          example: 0
        timestamp:
          type: integer
          format: int64
          example: 1715177400700

    GetNewTokenResponse:
      type: object
      required:
        - operatorId
        - token
        - balance
        - uid
        - errorCode
      properties:
        operatorId:
          type: integer
          example: 1
        token:
          type: string
          description: New session token with operator prefix
          example: "my-operator_new-token-def456"
        balance:
          type: number
          format: double
          description: Current player balance
          example: 1000.50
        uid:
          type: integer
          example: 12345
        errorCode:
          type: integer
          example: 0
        errorDescription:
          type: string
          example: "ok"
        timestamp:
          type: integer
          format: int64
          example: 1715177400701

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorDescription
      properties:
        errorCode:
          type: integer
          description: |
            Error codes:
            - 0: Success
            - 1: Generic error
            - 2: Invalid request
            - 3: Insufficient balance
            - 4: Invalid player
            - 5: Invalid operator
          example: 1
        errorDescription:
          type: string
          description: Human-readable error message
          example: "Invalid signature"

  securitySchemes:
    HmacSHA256:
      type: apiKey
      in: header
      name: hash
      description: |
        HMAC-SHA256 signature validation.
        Algorithm:
        1. Take request body as JSON string
        2. Calculate: base64(HMAC-SHA256(json_string, secret_key))
        3. Pass as 'hash' header

tags:
  - name: Session Management
    description: Authentication and token refresh operations
  - name: Financial Transactions
    description: Betting, credit, and rollback operations
