openapi: 3.0.0

info:
  title: Casino Proxy Admin API
  version: 1.0.0
  description: |
    Administrative API for Casino Proxy platform

    Provides operator management, system health checks, and image upload capabilities for admins.

    **Base URL:** `https://api.casino-proxy.local/v1`
  contact:
    name: Platform Support
    email: support@casino-proxy.local
  license:
    name: Internal
    url: https://casino-proxy.local/license

servers:
  - url: https://api.casino-proxy.local/v1
    description: Production Admin API
  - url: http://localhost:3000/v1
    description: Development Admin API

tags:
  - name: Operators
    description: Operator management (CRUD)
  - name: System
    description: System health and status
  - name: Upload
    description: Image upload

paths:
  /internal/operator/:
    get:
      tags:
        - Operators
      operationId: listOperators
      summary: List all operators
      description: Retrieve a paginated list of all operators in the system
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-indexed)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          description: Records per page (max 100)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
        - name: search
          in: query
          description: Search by slug or name (partial match, case-insensitive)
          schema:
            type: string
        - name: active_only
          in: query
          description: Only return active operators
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Operators retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorListResponse'
              example:
                data:
                  - id: 1
                    slug: my-operator
                    name: My Casino
                    url: https://my-casino.example.com/webhooks
                    is_active: true
                    created_at: "2026-05-08T12:00:00Z"
                    updated_at: "2026-05-08T12:00:00Z"
                pagination:
                  total: 1
                  per_page: 50
                  current_page: 1
                  last_page: 1
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_PARAMETER
                message: "per_page must be <= 100"
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/operator/store:
    post:
      tags:
        - Operators
      operationId: createOperator
      summary: Create a new operator
      description: Register a new operator/casino in the system
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOperatorRequest'
            example:
              slug: my-operator
              name: My Casino
              url: https://my-casino.example.com/webhooks
      responses:
        '201':
          description: Operator created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorResponse'
              example:
                id: 1
                slug: my-operator
                name: My Casino
                url: https://my-casino.example.com/webhooks
                is_active: true
                created_at: "2026-05-08T12:00:00Z"
                updated_at: "2026-05-08T12:00:00Z"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                error: VALIDATION_ERROR
                message: Validation failed
                errors:
                  slug:
                    - Slug already exists
                    - Slug must be lowercase alphanumeric
                  url:
                    - URL must be HTTPS
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (duplicate slug)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: DUPLICATE_SLUG
                message: "Operator with slug 'my-operator' already exists"
                field: slug
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/operator/delete/{slug}:
    delete:
      tags:
        - Operators
      operationId: deleteOperator
      summary: Delete an operator
      description: Remove an operator from the system
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          description: Operator slug
          schema:
            type: string
            example: my-operator
      responses:
        '200':
          description: Operator deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteOperatorResponse'
              example:
                message: Operator deleted successfully
                id: 1
                slug: my-operator
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Operator not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: NOT_FOUND
                message: "Operator with slug 'my-operator' not found"
        '400':
          description: Cannot delete (constraints exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: CONSTRAINT_VIOLATION
                message: "Cannot delete operator: still has active transactions"
                details:
                  active_transactions: 5
                  action: "Mark operator as inactive instead"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /status:
    get:
      tags:
        - System
      operationId: healthCheck
      summary: System health check
      description: Check if the system is operational
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
              example:
                message: OK
                status: healthy
                timestamp: "2026-05-08T12:00:00Z"
        '503':
          description: System is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
              example:
                message: Service unhealthy
                status: unhealthy
                timestamp: "2026-05-08T12:00:00Z"
                services:
                  database: unavailable
                  cache: healthy

  /entry:
    post:
      tags:
        - System
      operationId: adminEntry
      summary: Admin dashboard entry point
      description: Authenticate and create session for admin dashboard access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminEntryRequest'
            example:
              email: admin@example.com
              password: password123
              remember: false
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEntryResponse'
              example:
                message: Authenticated
                user:
                  id: 1
                  email: admin@example.com
                  name: Admin User
                token: "token_string"
                redirect: "/dashboard"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_CREDENTIALS
                message: Invalid email or password
        '429':
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: TOO_MANY_ATTEMPTS
                message: "Too many login attempts. Please try again in 15 minutes."

  /image:
    post:
      tags:
        - Upload
      operationId: uploadImage
      summary: Upload operator image
      description: Upload an image file (logo, banner, etc.) for an operator
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImageUploadRequest'
      responses:
        '200':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageUploadResponse'
              example:
                message: Image uploaded successfully
                image:
                  id: 1
                  filename: logo-1715241600.png
                  url: https://cdn.casino-proxy.local/images/logo-1715241600.png
                  size: 25600
                  type: logo
                  operator_slug: my-operator
                  uploaded_at: "2026-05-08T12:00:00Z"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: MISSING_FILE
                message: "No file provided in 'image' field"
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: FILE_TOO_LARGE
                message: "File size exceeds maximum allowed (5 MB)"
                max_size_mb: 5
                file_size_mb: 12
        '415':
          description: Unsupported file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_FILE_TYPE
                message: File type not accepted
                accepted_types:
                  - jpg
                  - jpeg
                  - png
                  - webp
                  - gif
        '507':
          description: Insufficient storage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: STORAGE_FULL
                message: Image storage is full
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/credentials/:
    get:
      tags:
        - Credentials
      operationId: listCredentials
      summary: List provider credentials
      description: Retrieve list of all provider credentials (values redacted for security)
      security:
        - BearerAuth: []
      parameters:
        - name: operator_slug
          in: query
          description: Filter by operator slug
          schema:
            type: string
        - name: provider_name
          in: query
          description: Filter by provider name
          schema:
            type: string
      responses:
        '200':
          description: Credentials retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsListResponse'
              example:
                credentials:
                  - id: 1
                    operator_slug: my-operator
                    provider_name: pragmatic
                    key: secret-key
                    value: "***hidden***"
                    created_at: "2026-05-08T12:00:00Z"
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Operator:
      type: object
      properties:
        id:
          type: integer
          description: Unique operator ID
          example: 1
        slug:
          type: string
          description: Unique operator slug (lowercase alphanumeric + hyphens)
          pattern: '^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$'
          minLength: 3
          maxLength: 50
          example: my-operator
        name:
          type: string
          description: Operator display name
          minLength: 1
          maxLength: 255
          example: My Casino
        url:
          type: string
          format: uri
          description: Webhook callback URL (HTTPS only)
          example: https://my-casino.example.com/webhooks
        is_active:
          type: boolean
          description: Whether operator is active
          example: true
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2026-05-08T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2026-05-08T12:00:00Z"
      required:
        - id
        - slug
        - name
        - url
        - is_active
        - created_at
        - updated_at

    CreateOperatorRequest:
      type: object
      properties:
        slug:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$'
          minLength: 3
          maxLength: 50
          description: Unique operator slug
          example: my-operator
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Operator display name
          example: My Casino
        url:
          type: string
          format: uri
          description: Webhook callback URL (HTTPS required)
          example: https://my-casino.example.com/webhooks
      required:
        - slug
        - name
        - url

    OperatorResponse:
      allOf:
        - $ref: '#/components/schemas/Operator'

    OperatorListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Operator'
        pagination:
          type: object
          properties:
            total:
              type: integer
              example: 50
            per_page:
              type: integer
              example: 50
            current_page:
              type: integer
              example: 1
            last_page:
              type: integer
              example: 1
            from:
              type: integer
              example: 1
            to:
              type: integer
              example: 50

    DeleteOperatorResponse:
      type: object
      properties:
        message:
          type: string
          example: Operator deleted successfully
        id:
          type: integer
          example: 1
        slug:
          type: string
          example: my-operator

    HealthCheckResponse:
      type: object
      properties:
        message:
          type: string
          example: OK
        status:
          type: string
          enum:
            - healthy
            - unhealthy
          example: healthy
        timestamp:
          type: string
          format: date-time
          example: "2026-05-08T12:00:00Z"
        services:
          type: object
          additionalProperties:
            type: string
          example:
            database: healthy
            cache: healthy

    AdminEntryRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Admin email
          example: admin@example.com
        password:
          type: string
          description: Admin password
          format: password
          example: password123
        remember:
          type: boolean
          description: Remember login
          default: false
      required:
        - email
        - password

    AdminEntryResponse:
      type: object
      properties:
        message:
          type: string
          example: Authenticated
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              example: admin@example.com
            name:
              type: string
              example: Admin User
        token:
          type: string
          description: Sanctum authentication token
          example: "token_string"
        redirect:
          type: string
          description: URL to redirect after login
          example: /dashboard
      required:
        - message
        - user

    ImageUploadRequest:
      type: object
      properties:
        image:
          type: string
          format: binary
          description: Image file (JPG, PNG, WebP, GIF)
        type:
          type: string
          description: Image type/category
          example: logo
        operator_slug:
          type: string
          description: Operator slug to associate with image
          example: my-operator
      required:
        - image

    ImageUploadResponse:
      type: object
      properties:
        message:
          type: string
          example: Image uploaded successfully
        image:
          type: object
          properties:
            id:
              type: integer
              example: 1
            filename:
              type: string
              example: logo-1715241600.png
            url:
              type: string
              format: uri
              example: https://cdn.casino-proxy.local/images/logo-1715241600.png
            size:
              type: integer
              description: File size in bytes
              example: 25600
            type:
              type: string
              example: logo
            operator_slug:
              type: string
              example: my-operator
            uploaded_at:
              type: string
              format: date-time
              example: "2026-05-08T12:00:00Z"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code
          example: NOT_FOUND
        message:
          type: string
          description: Human-readable error message
          example: Resource not found
        field:
          type: string
          description: Field related to error (if applicable)
        details:
          type: object
          description: Additional error details
          additionalProperties: true

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            errors:
              type: object
              description: Field-level validation errors
              additionalProperties:
                type: array
                items:
                  type: string
              example:
                slug:
                  - Slug already exists
                  - Slug must be lowercase alphanumeric
                url:
                  - URL must be HTTPS

    CredentialsListResponse:
      type: object
      properties:
        credentials:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                example: 1
              operator_slug:
                type: string
                example: my-operator
              provider_name:
                type: string
                description: Provider name (pragmatic, evolution, pgsoft, mancala, digitain, evoplay, openbox, alternar)
                example: pragmatic
              key:
                type: string
                description: Credential key
                example: secret-key
              value:
                type: string
                description: Credential value (redacted in list responses)
                example: "***hidden***"
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Laravel Sanctum bearer token

security:
  - {}  # Allow public endpoints (like /v1/status)
  - BearerAuth: []

x-info:
  api-version: 1.0.0
  last-updated: "2026-05-08"
  contact: "support@casino-proxy.local"
