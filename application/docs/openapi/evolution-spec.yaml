openapi: 3.0.0
info:
  title: Evolution Gaming Provider API
  version: 1.0.0
  description: |
    Gaming provider webhooks for Evolution Gaming integration.
    All requests include HMAC-SHA256 hash authentication in headers.
  contact:
    name: Casino Proxy Team

servers:
  - url: /v1/webhooks

paths:
  /evolution/authentication:
    post:
      operationId: evolutionAuthentication
      tags:
        - Evolution Gaming
      summary: Authenticate player
      description: Authenticate player session with Evolution Gaming backend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvolutionAuthenticationRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvolutionAuthenticationResponse'

  /evolution/debit:
    post:
      operationId: evolutionDebit
      tags:
        - Evolution Gaming
      summary: Debit player account
      description: Debit player account for bet placement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvolutionDebitRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvolutionDebitResponse'

  /evolution/credit:
    post:
      operationId: evolutionCredit
      tags:
        - Evolution Gaming
      summary: Credit player account
      description: Credit player account for win/payout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvolutionCreditRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvolutionCreditResponse'

  /evolution/rollback:
    post:
      operationId: evolutionRollback
      tags:
        - Evolution Gaming
      summary: Rollback transaction
      description: Rollback or cancel existing transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvolutionRollbackRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvolutionRollbackResponse'

  /evolution/getNewToken:
    post:
      operationId: evolutionGetNewToken
      tags:
        - Evolution Gaming
      summary: Request new token
      description: Request and receive new player session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvolutionGetNewTokenRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvolutionGetNewTokenResponse'

components:
  schemas:
    EvolutionBaseRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Player session token (sanitized)
          example: token123

    EvolutionAuthenticationRequest:
      allOf:
        - $ref: '#/components/schemas/EvolutionBaseRequest'
        - type: object
          properties:
            gameId:
              type: string
              example: game_789
            sessionId:
              type: string
              example: session_456

    EvolutionAuthenticationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        playerId:
          type: string
          example: player_456
        balance:
          type: number
          format: double
          example: 1000.00
        currency:
          type: string
          example: BRL

    EvolutionDebitRequest:
      allOf:
        - $ref: '#/components/schemas/EvolutionBaseRequest'
        - type: object
          required:
            - transactionId
            - amount
            - gameId
          properties:
            transactionId:
              type: string
              example: txn_129
            amount:
              type: number
              format: double
              example: 50.00
            gameId:
              type: string
              example: game_789

    EvolutionDebitResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        balance:
          type: number
          format: double
          example: 950.00
        transactionId:
          type: string
          example: txn_129

    EvolutionCreditRequest:
      allOf:
        - $ref: '#/components/schemas/EvolutionBaseRequest'
        - type: object
          required:
            - transactionId
            - amount
            - gameId
          properties:
            transactionId:
              type: string
              example: txn_130
            amount:
              type: number
              format: double
              example: 100.00
            gameId:
              type: string
              example: game_789

    EvolutionCreditResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        balance:
          type: number
          format: double
          example: 1050.00
        transactionId:
          type: string
          example: txn_130

    EvolutionRollbackRequest:
      allOf:
        - $ref: '#/components/schemas/EvolutionBaseRequest'
        - type: object
          required:
            - transactionId
            - gameId
          properties:
            transactionId:
              type: string
              example: txn_129
            gameId:
              type: string
              example: game_789

    EvolutionRollbackResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        balance:
          type: number
          format: double
          example: 1000.00
        transactionId:
          type: string
          example: txn_129

    EvolutionGetNewTokenRequest:
      type: object

    EvolutionGetNewTokenResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string
          example: new_token_456

  securitySchemes:
    hmacSha256Header:
      type: apiKey
      in: header
      name: hash
      description: Base64 encoded HMAC-SHA256 signature
