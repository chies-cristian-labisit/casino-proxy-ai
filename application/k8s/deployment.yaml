# Deployment for casino-proxy-ai on AWS EKS
# Replace placeholders before deploying:
#   <ECR_REPO>  → your ECR repository URI
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-proxy-ai
  namespace: default
  labels:
    app: casino-proxy-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-proxy-ai
  template:
    metadata:
      labels:
        app: casino-proxy-ai
    spec:
      containers:
        - name: api
          image: <ECR_REPO>/casino-proxy-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: PORT
              value: "8081"
            - name: APP_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: casino-proxy-ai-secrets
                  key: DATABASE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: casino-proxy-ai-secrets
                  key: KAFKA_BROKERS
            - name: KAFKA_TOPIC
              valueFrom:
                secretKeyRef:
                  name: casino-proxy-ai-secrets
                  key: KAFKA_TOPIC
            - name: KAFKA_GROUP_ID
              value: "casino-proxy-ai"
          livenessProbe:
            httpGet:
              path: /liveness
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: casino-proxy-ai
