# Kubernetes Gateway API HTTPRoute for casino-proxy-ai
# Routes /api/v1/customers/* traffic from the internal gateway to the service.
# Implements Strangler Fig pattern: API Gateway routes legacy PHP traffic to the
# existing monolith and new /api/v1/customers/* traffic through VPC Link to this service.
#
# Prerequisites:
#   - Gateway API CRDs installed on the cluster (gateway.networking.k8s.io/v1)
#   - A Gateway named "internal-gateway" in namespace "gateway" (provisioned by platform team)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: casino-proxy-ai
  namespace: default
  labels:
    app: casino-proxy-ai
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/customers
      backendRefs:
        - name: casino-proxy-ai
          port: 80
