# Kubernetes Gateway API HTTPRoute for ms-casino-go-v2
# Routes /api/v2/customers/* traffic from the internal gateway to the service.
# Implements Strangler Fig pattern: API Gateway routes legacy PHP traffic to the
# existing monolith and new /api/v2/customers/* traffic through VPC Link to this service.
#
# Prerequisites:
#   - Gateway API CRDs installed on the cluster (gateway.networking.k8s.io/v1)
#   - A Gateway named "internal-gateway" in namespace "gateway" (provisioned by platform team)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "ms-casino-go-v2"
  namespace: "default"
  labels:
    app: "ms-casino-go-v2"
spec:
  parentRefs:
    - name: "internal-gateway"
      namespace: "gateway"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v2/customers"
      backendRefs:
        - name: "ms-casino-go-v2"
          port: 80
