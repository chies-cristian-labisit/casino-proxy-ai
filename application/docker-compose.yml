version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ms-casino-go-v2-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go_backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/confluent-local:7.5.0
    container_name: ms-casino-go-v2-kafka
    environment:
      CLUSTER_ID: "obLD1OX2SJCrze8SNFZ4kA"
      # Two listeners:
      #   PLAINTEXT  → host access via localhost:9092
      #   INTERNAL   → container-to-container via kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Full-stack: start with `docker-compose --profile full up -d`
  # or use `make up-full` / `make rebuild`
  app:
    profiles:
      - full
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-casino-go-v2-app
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/go_backend?sslmode=disable
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: events
      PORT: "8081"
      KAFKA_GROUP_ID: ms-casino-go-v2
      KAFKA_WORKERS: "5"
      IDEMPOTENCY_LOCK_TTL: "30"
      APP_ENV: development
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local

networks:
  default:
    name: ms-casino-go-v2-network
